<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="title">Expense Tracker</div>

    <div class="container">
        <p class="balance-title">Current Balance</p>
        <p id="amountResult">₱ 0.00</p>
    </div>

    <div class="input-section">
        <input type="number" id="totalAmount" placeholder="Total Amount">
        <button onclick="addTotalAmount()">Add Total</button>
    </div>

    <div class="input-section">
        <input type="text" id="description" placeholder="Description">
        <input type="number" id="amount" placeholder="Amount">
        <button onclick="addExpense()">Add Expense</button>
    </div>

    <p id="alerts"></p>

    <div class="table-container">
        <table>
            <tr>
                <th>Description</th>
                <th>Amount</th>
                <th>Result</th>
            </tr>
            <tr>
                <td id="expenseDescription"></td>
                <td id="expenseAmount"></td>
                <td id="expenseResult"></td>
            </tr>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
