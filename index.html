<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="title">Expense Tracker</div>

    <div class="container">
        <p class="balance-title">Current Balance</p>
        <p id="amountResult">₱ 0.00</p>
    </div>

    <button onclick="openTotalModal()">Add Total</button><br>
    <button onclick="openExpenseModal()">Add Expense</button>

    <p id="alerts"></p>

    <div class="table-container">
        <table>
            <tr>
                <th>Description</th>
                <th>Amount</th>
                <th>Result</th>
            </tr>

            <tr>
                <td id="expenseDescription"></td>
                <td id="expenseAmount"></td>
                <td id="expenseResult"></td>
            </tr>
        </table>
    </div>

    <!-- TOTAL MODAL -->
    <div id="totalModal" class="modal">
        <div class="modal-content">
            <h3>Add Total</h3>
            <input type="number" id="modalTotalAmount" placeholder="Total Amount">
            <button onclick="submitTotal()">Save</button>
            <button onclick="closeTotalModal()">Close</button>
        </div>
    </div>

    <!-- EXPENSE MODAL -->
    <div id="expenseModal" class="modal">
        <div class="modal-content">
            <h3>Add Expense</h3>

            <input type="text" id="modalDescription" placeholder="Description">
            <input type="number" id="modalAmount" placeholder="Amount">

            <button onclick="submitExpense()">Save</button>
            <button onclick="closeExpenseModal()">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
